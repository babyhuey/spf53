name: Release

on:
  release:
    types: [published]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.13"

      - name: Install spf53 with dev dependencies
        run: pip install -e .[dev]

      - name: ruff check
        run: ruff check .

      - name: ruff format --check
        run: ruff format --check .

      - name: pytest
        run: pytest

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.13"

      - name: Verify tag matches pyproject.toml version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          PYPROJECT_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
          TAG_VERSION="${RELEASE_TAG#v}"
          if [ "$TAG_VERSION" != "$PYPROJECT_VERSION" ]; then
            echo "::error::Release tag ($RELEASE_TAG -> $TAG_VERSION) does not match pyproject.toml version ($PYPROJECT_VERSION)"
            exit 1
          fi
          echo "Tag version $TAG_VERSION matches pyproject.toml version $PYPROJECT_VERSION"

      - name: Install build tooling
        run: pip install build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: Check package metadata
        run: twine check dist/*

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  smoke-test-wheel:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.13"

      - name: Install the built wheel into a fresh venv
        run: |
          python -m venv smoke-venv
          smoke-venv/bin/pip install dist/*.whl

      - name: Smoke test the CLI entry point
        run: smoke-venv/bin/spf53 --help

      - name: Smoke test build_lambda_zip() end to end
        run: |
          smoke-venv/bin/python <<'PY'
          import io
          import zipfile

          from spf53 import deploy

          zip_bytes = deploy.build_lambda_zip()
          assert zip_bytes, "build_lambda_zip() returned an empty package"

          with zipfile.ZipFile(io.BytesIO(zip_bytes)) as zf:
              names = zf.namelist()

          assert "spf53/lambda_handler.py" in names, names
          assert any(n.endswith(".dist-info/METADATA") for n in names), names
          print(f"build_lambda_zip smoke test OK: {len(names)} files in package")
          PY

  publish:
    needs: [build, smoke-test-wheel]
    if: ${{ !github.event.release.prerelease }}
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/spf53/
    permissions:
      id-token: write
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
