name: Release

on:
  release:
    types: [published]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.13"

      - name: Install spf53 with dev dependencies
        run: pip install -e .[dev]

      - name: ruff check
        run: ruff check .

      - name: ruff format --check
        run: ruff format --check .

      - name: pytest
        run: pytest

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.13"

      - name: Verify tag matches pyproject.toml version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          PYPROJECT_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
          TAG_VERSION="${RELEASE_TAG#v}"
          if [ "$TAG_VERSION" != "$PYPROJECT_VERSION" ]; then
            echo "::error::Release tag ($RELEASE_TAG -> $TAG_VERSION) does not match pyproject.toml version ($PYPROJECT_VERSION)"
            exit 1
          fi
          echo "Tag version $TAG_VERSION matches pyproject.toml version $PYPROJECT_VERSION"

      - name: Install build tooling
        run: pip install build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: Check package metadata
        run: twine check dist/*

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    if: ${{ !github.event.release.prerelease }}
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/spf53/
    permissions:
      id-token: write
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
